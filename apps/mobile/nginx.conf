server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA (Expo web output "single"): toda rota cai no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
